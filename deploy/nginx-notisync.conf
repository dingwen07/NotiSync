# NotiSync broker — TLS termination + WebSocket proxy.
# Cloudflare (Full/Strict) -> this origin :443 using the Cloudflare Origin Certificate ->
# the brokers on loopback. WebSockets (the dev/live transport) pass through the upgrade map.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name notisync-api.extrawdw.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name notisync-api.extrawdw.net;

    ssl_certificate     /etc/notisync/cert.pem;
    ssl_certificate_key /etc/notisync/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Authenticated Origin Pulls (Cloudflare Global): require a TLS client cert
    # issued by Cloudflare's origin-pull CA, so the origin rejects any connection
    # that didn't come through Cloudflare's edge (defends the direct-to-origin path).
    ssl_client_certificate /etc/notisync/cloudflare-origin-pull-ca.pem;
    ssl_verify_client on;

    # Generous bodies for CBOR envelopes / blobs.
    client_max_body_size 8m;

    # Legacy NS1 remains available only under /v1. Everything else goes to the NS2 broker on :8082.
    location = /v1 {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep WebSocket connections open.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep WebSocket connections open.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep WebSocket connections open.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
