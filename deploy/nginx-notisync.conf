# NotiSync broker — TLS termination + WebSocket proxy.
# Cloudflare (Full/Strict) -> this origin :443 using the Cloudflare Origin Certificate ->
# the broker on 127.0.0.1:8080. WebSockets (the dev/live transport) pass through the upgrade map.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name notisync-api.extrawdw.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name notisync-api.extrawdw.net;

    ssl_certificate     /etc/notisync/cert.pem;
    ssl_certificate_key /etc/notisync/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Generous bodies for CBOR envelopes / blobs.
    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep WebSocket connections open.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
