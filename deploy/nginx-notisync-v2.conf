# Dedicated compact-CBOR NS2 broker vhost: Cloudflare -> nginx -> loopback :8082.
# Reuses the wildcard Cloudflare Origin Certificate installed for the test vhost.
server {
    listen 80;
    listen [::]:80;
    server_name notisync-api-v2.extrawdw.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name notisync-api-v2.extrawdw.net;

    ssl_certificate     /etc/notisync/test-cert.pem;
    ssl_certificate_key /etc/notisync/test-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_client_certificate /etc/notisync/cloudflare-origin-pull-ca.pem;
    ssl_verify_client on;

    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
