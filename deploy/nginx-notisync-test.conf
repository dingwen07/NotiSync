# NotiSync TEST broker vhost — notisync-api-test.extrawdw.net -> 127.0.0.1:8081.
# Co-located with prod on the same origin. Cloudflare (Full/Strict) terminates at the edge and
# connects here over the *.extrawdw.net Cloudflare Origin Certificate.
#
# NOTE: this file deliberately does NOT define `map $http_upgrade $connection_upgrade` — it reuses
# the one declared in the prod site (nginx-notisync.conf), since both are included in the http block
# and a second map would be a duplicate-definition error.

server {
    listen 80;
    listen [::]:80;
    server_name notisync-api-test.extrawdw.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name notisync-api-test.extrawdw.net;

    ssl_certificate     /etc/notisync/test-cert.pem;
    ssl_certificate_key /etc/notisync/test-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 8m;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Keep WebSocket connections open.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
